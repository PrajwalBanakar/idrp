spring.application.name=idrp-backend

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Auto-creates one SUPER_ADMIN on first startup if the admins table is empty.
# Only needed for the very first deploy; has no effect once any admin row exists.
app.admin.bootstrap-email=${INITIAL_ADMIN_EMAIL:}
app.admin.bootstrap-password=${INITIAL_ADMIN_PASSWORD:}

# Set SEED_STATIC_DATA=true only when you deliberately want to (re-)import the
# static frontend content. Defaults to false so production never auto-seeds.
app.seed-static-data=${SEED_STATIC_DATA:false}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.base-url=${UPLOAD_BASE_URL}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://idrp.in,https://www.idrp.in}

# Only the health endpoint is exposed - never widen this without also locking it
# down behind admin auth, since other actuator endpoints can leak internal details.
management.endpoints.web.exposure.include=health